name: YouTube 데이터 합치기

on:
  workflow_dispatch:   # 수동 실행 버튼 (모든 shard가 끝난 뒤에 직접 눌러서 실행)

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install pandas

      - name: 합치기 실행
        run: |
          python merge_results.py --base-dir data/youtube --out-dir data/youtube

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/youtube/all_videos.csv data/youtube/all_comments.csv
          if git diff --staged --quiet; then
            echo "변경사항 없음"
            exit 0
          fi
          git commit -m "videos/comments 통합 CSV 갱신: $(date -u +'%Y-%m-%d')"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
